meters:
- name: monthly_active_users
  description: Distinct users active in a billing month; base allotment per tier with $0.10 per-MAU overage.
  unit: users
  aggregation: max
  dimensions:
  - account
  - app
- name: mau_overage
  description: MAU above the tier allotment, billed at $0.10 per user on paid tiers.
  unit: users
  aggregation: sum
  dimensions:
  - account
  - app
- name: concurrent_connections
  description: Peak simultaneous WebSocket connections; included as a percentage of MAU per tier.
  unit: connections
  aggregation: max
  dimensions:
  - account
  - app
- name: connection_overage
  description: Concurrent connections above the included allotment, billed at $1 each except on Enterprise.
  unit: connections
  aggregation: sum
  dimensions:
  - account
  - app
- name: subscription_base
  description: Fixed monthly base fee for the selected tier and MAU bracket.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - tier
principles:
- name: Visibility
  description: Track MAU and peak concurrent connections per app in the CometChat dashboard against the tier allotment.
- name: Allocation
  description: Use separate apps (App IDs) per product or environment to attribute MAU and connection cost to teams.
- name: Optimization
  description: Right-size the MAU tier to actual active users, manage WebSocket connections manually to avoid idle sockets, and consider Enterprise to eliminate overage when usage is high and spiky.
- name: Accountability
  description: Review monthly MAU and connection overage against the budget; reconcile annual vs. monthly billing for committed-use savings.
