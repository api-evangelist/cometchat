description: >-
  FinOps view of CometChat spend. CometChat bills a tier-based subscription
  anchored to a Monthly Active Users (MAU) allotment, with overage charged per
  additional MAU ($0.10) and per additional concurrent WebSocket connection
  ($1) above the included percentage of MAU. Messages, storage, and files are
  unlimited and not separately metered. Enterprise removes overage charges.
notes: >-
  MAU is the dominant cost driver; concurrent connections are the secondary
  driver. Verify current per-MAU and per-connection overage rates and tier
  allotments against the CometChat pricing page during reconciliation.
sources:
- https://www.cometchat.com/pricing
- https://www.cometchat.com/docs
- https://focus.finops.org/focus-specification/v1-3/
