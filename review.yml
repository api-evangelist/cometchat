actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    The REST Management API is documented and was modeled as OpenAPI 3.0.1.
    The realtime WebSocket layer is real but undocumented at the protocol
    level (SDK-encapsulated), so no AsyncAPI document was authored to avoid
    fabricating channels, messages, or bindings. The Realtime & Client SDK is
    catalogued as a sub-API in apis.yml with an AsyncAPI property placeholder
    so a spec can be added if CometChat publishes the socket protocol.
