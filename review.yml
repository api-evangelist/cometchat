aid: cometchat
name: CometChat
review:
  question: Does CometChat expose a documented public WebSocket API surface that can be modeled with AsyncAPI?
  answer: partial
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    CometChat operates a real realtime layer over WebSockets, but it is a
    managed transport consumed exclusively through the CometChat client SDKs
    (JavaScript, React, React Native, Android, iOS, Flutter, Ionic). The SDK
    establishes and maintains the socket via connect()/disconnect() and an
    autoEstablishSocketConnection() toggle. CometChat does NOT publish a raw
    wss:// endpoint, a connection URL, a handshake/authentication frame, or a
    message payload schema for the socket. Because no channel, message, or
    binding can be documented from public sources without invention, no
    AsyncAPI document was authored. An AsyncAPI spec should be created only if
    CometChat later publishes the socket protocol, or if the protocol is
    captured under a future reverse-engineering scope.
findings:
  summary: |
    CometChat is an in-app messaging platform with two distinct API surfaces.
    (1) A documented server-side REST Management API (v3) hosted per app and
    region at https://{appId}.api-{region}.cometchat.io/v3, authenticated with
    a Rest API Key in the `apikey` header, covering users, auth tokens, groups,
    group members, messages, conversations, reactions, roles, friends, blocked
    users, banned users, and webhooks. This REST surface is fully modeled in
    openapi/cometchat-openapi.yml. (2) A managed realtime WebSocket layer that
    delivers messages, presence, typing indicators, and read receipts to end
    users, but ONLY through the client SDKs - the wss endpoint and message
    protocol are not publicly documented and therefore not modeled as AsyncAPI.
    Voice and video calling are likewise delivered via the SDKs (WebRTC) and
    are out of scope for both OpenAPI and AsyncAPI here.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://{appId}.api-{region}.cometchat.io/v3
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: Realtime delivery exists and is real, but the socket URL, handshake, and message schema are encapsulated inside the client SDKs and not published. Managed via connect()/disconnect() / autoEstablishSocketConnection().
    - protocol: Webhooks
      scheme: https
      note: Outbound HTTP callbacks to customer endpoints driven by event triggers (message_sent, user_created, group_member_added, etc.); configured via the REST Management API.
      documented: true
