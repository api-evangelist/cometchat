- aid: cometchat:cometchat-realtime-sdk
  name: CometChat Realtime & Client SDK
  tags:
  - Realtime
  - WebSocket
  - SDK
  - Presence
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
